<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Research origin illustration</title>
  <desc id="desc">A research lab hologram showing the birth of a virtual society of generative agents.</desc>
  <defs>
