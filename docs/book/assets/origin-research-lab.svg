<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Generative Agents research origin illustration</title>
  <desc id="desc">An editorial illustration showing research ideas becoming a miniature simulated town of generative agents.</desc>
  <defs>
    <linearGradient id="paper-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5ee"/>
      <stop offset="48%" stop-color="#edf6f2"/>
      <stop offset="100%" stop-color="#f3efe8"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dce9e3"/>
      <stop offset="55%" stop-color="#cbded8"/>
      <stop offset="100%" stop-color="#b8ccc7"/>
    </linearGradient>
    <linearGradient id="town-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9fffb" stop-opacity=".92"/>
      <stop offset="52%" stop-color="#d8f8ef" stop-opacity=".82"/>
      <stop offset="100%" stop-color="#b8eadf" stop-opacity=".74"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17333a"/>
      <stop offset="100%" stop-color="#254b52"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9f3ef"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#19333b" flood-opacity=".18"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#19333b" flood-opacity=".13"/>
    </filter>
    <filter id="paper-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0v46" fill="none" stroke="#8fb7b1" stroke-width="1" opacity=".22"/>
    </pattern>
  </defs>

  <rect width="1400" height="760" fill="url(#paper-bg)"/>
