<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">图 1-1：Generative Agents 的领域交叉位置</title>
  <desc id="desc">Generative Agents 位于人机交互、语言模型、游戏 NPC 和社会仿真四个方向的交叉处。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1120" height="660" fill="#f8fafc"/>
  <rect x="52" y="48" width="1016" height="564" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="560" y="102" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" fill="#102033">Generative Agents 的问题位置</text>
  <text x="560" y="140" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#64748b">它不是单纯的 prompt 工程，而是多个研究传统汇合后的系统形态</text>

  <g filter="url(#shadow)">
    <rect x="120" y="185" width="315" height="145" rx="18" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="278" y="235" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="25" font-weight="700" fill="#075985">人机交互</text>
    <text x="278" y="271" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#0f4f6e">用户如何理解、干预、评估</text>
    <text x="278" y="300" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#0f4f6e">一个由 AI 驱动的社会</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="685" y="185" width="315" height="145" rx="18" fill="#dcfce7" stroke="#4ade80"/>
    <text x="843" y="235" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="25" font-weight="700" fill="#166534">大语言模型</text>
    <text x="843" y="271" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#1f5f38">常识推理、自然语言记忆</text>
    <text x="843" y="300" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#1f5f38">计划生成与对话能力</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="415" width="315" height="145" rx="18" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="278" y="465" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="25" font-weight="700" fill="#92400e">游戏 NPC</text>
    <text x="278" y="501" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#7a3f12">角色不只触发脚本</text>
    <text x="278" y="530" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#7a3f12">而是在世界中持续生活</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="685" y="415" width="315" height="145" rx="18" fill="#fce7f3" stroke="#f472b6"/>
    <text x="843" y="465" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="25" font-weight="700" fill="#9d174d">社会仿真</text>
    <text x="843" y="501" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#831843">信息扩散、关系形成</text>
    <text x="843" y="530" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#831843">群体行为与涌现现象</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="282" width="300" height="120" rx="24" fill="#1e293b"/>
    <text x="560" y="330" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#ffffff">Generative Agents</text>
    <text x="560" y="365" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#cbd5e1">可信人类行为代理</text>
  </g>

  <line x1="435" y1="290" x2="465" y2="315" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="685" y1="290" x2="655" y2="315" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="435" y1="455" x2="465" y2="390" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="685" y1="455" x2="655" y2="390" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
